<!DOCTYPE html>
<html>
<head>
    <title>CCTV System</title>
    <style>
        body {
            text-align: center;
            background: #111;
            color: white;
        }

        #rec-indicator {
            position: absolute;
            top: 20px;
            right: 30px;
            display: none;
            color: red;
            font-weight: bold;
            font-size: 22px;
        }

        .dot {
            height: 14px;
            width: 14px;
            background-color: red;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="rec-indicator">
        <span class="dot"></span> REC
    </div>

    <h1>Live CCTV Feed</h1>

    <img src="{{ url_for('video') }}" width="720">

    <br>

    <button onclick="startRecording()">Start Recording</button>
    <button onclick="stopRecording()">Stop Recording</button>
    
     <br><br>
    <a href="/recordings">View Recordings</a>

    <script>
        function startRecording() {
            fetch('/start_recording');
        }

        function stopRecording() {
            fetch('/stop_recording');
        }

        // Check recording status every second
        setInterval(() => {
            fetch('/recording_status')
            .then(res => res.json())
            .then(data => {
                const indicator = document.getElementById("rec-indicator");
                indicator.style.display = data.recording ? "block" : "none";
            });
        }, 1000);
    </script>

</body>
</html>
